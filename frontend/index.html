<!doctype html>
<html lang="da" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.svg" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#0F766E" />

    <!-- SEO -->
    <title>HusKlar — Din guide til boligkøb</title>
    <meta
      name="description"
      content="Smart værktøj til førstegangskøbere i Danmark. AI-analyse af tilstandsrapport og elrapport, låneberegner og omgivelsesanalyse — alt samlet ét sted."
    />
    <link rel="canonical" href="https://bosslarit.github.io/husklar/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="HusKlar — Din guide til boligkøb" />
    <meta
      property="og:description"
      content="AI-analyse af rapporter, låneberegner og omgivelsesanalyse for førstegangskøbere i Danmark."
    />
    <meta property="og:url" content="https://bosslarit.github.io/husklar/" />
    <meta property="og:site_name" content="HusKlar" />
    <meta property="og:locale" content="da_DK" />
    <meta property="og:image" content="https://bosslarit.github.io/husklar/apple-touch-icon.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="HusKlar — Din guide til boligkøb" />
    <meta
      name="twitter:description"
      content="AI-analyse af rapporter, låneberegner og omgivelsesanalyse for førstegangskøbere i Danmark."
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data for search engines -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "HusKlar",
        "alternateName": "HusKlar — Din guide til boligkøb",
        "url": "https://bosslarit.github.io/husklar/",
        "description": "Smart værktøj til førstegangskøbere i Danmark. AI-analyse af tilstandsrapport og elrapport, låneberegner og omgivelsesanalyse.",
        "inLanguage": "da-DK"
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "HusKlar",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "DKK"
        },
        "description": "AI-analyse af boligrapporter, låneberegner og omgivelsesanalyse for førstegangskøbere i Danmark.",
        "inLanguage": "da-DK",
        "audience": {
          "@type": "Audience",
          "audienceType": "First-time home buyers in Denmark"
        }
      }
    </script>
    <!-- GitHub Pages SPA redirect decoder — pairs with public/404.html to support deep-links -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
